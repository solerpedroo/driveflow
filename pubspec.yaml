name: driveflow
description: Gestão financeira e inteligência para motoristas de aplicativo.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  app_links: ^6.4.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.4
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.2
  flutter_local_notifications: ^18.0.1
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.4
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  fl_chart: ^0.70.2
  freezed_annotation: ^3.0.0
  go_router: ^14.8.1
  google_fonts: ^7.0.0
  google_mlkit_text_recognition: ^0.14.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hooks_riverpod: ^2.6.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  path_provider: ^2.1.5
  pdf: ^3.11.3
  riverpod_annotation: ^2.6.1
  share_plus: ^10.1.4
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.9.0
  timezone: ^0.10.0
  url_launcher: ^6.3.1
  file_picker: ^8.1.7

dev_dependencies:
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  riverpod_lint: ^2.6.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/icon_master_1024.png
  adaptive_icon_background: "#0064F5"
  adaptive_icon_foreground: assets/branding/icon_foreground_1024.png
  adaptive_icon_foreground_inset: 16
  remove_alpha_ios: true
  background_color_ios: "#0064F5"

flutter_native_splash:
  color: "#0064F5"
  image: assets/branding/splash_logo.png
  android: true
  ios: true
  android_12:
    color: "#0064F5"
    image: assets/branding/splash_logo.png
  fullscreen: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/brands/
    - assets/branding/
