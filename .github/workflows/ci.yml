name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install Linux integration test deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build cmake clang pkg-config libgtk-3-dev

      - name: Analyze
        run: flutter analyze

      - name: Custom lint
        run: dart run custom_lint

      - name: Test
        run: flutter test

      - name: Integration test
        run: flutter test integration_test -d linux
